---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-demo
  namespace: k8swhisperer-demo
  labels:
    app: webapp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-demo
  template:
    metadata:
      labels:
        app: webapp-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
            limits:
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-demo
  namespace: k8swhisperer-demo
spec:
  selector:
    app: webapp-demo
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: webapp-demo
  namespace: k8swhisperer-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webapp-demo
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
