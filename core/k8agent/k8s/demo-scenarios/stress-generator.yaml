---
apiVersion: v1
kind: Pod
metadata:
  name: load-generator
  namespace: k8swhisperer-demo
  labels:
    app: load-generator
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - "while true; do wget -q -O- http://webapp-demo.k8swhisperer-demo.svc.cluster.local; done"
  restartPolicy: Always
