apiVersion: v1
kind: Pod
metadata:
  name: imagepull-demo
  namespace: k8swhisperer-demo
  labels:
    app: imagepull-demo
    scenario: image-pull-backoff
    app.kubernetes.io/name: k8swhisperer
    app.kubernetes.io/component: demo
spec:
  restartPolicy: Never
  containers:
    - name: imagepull
      image: registry.example.com/nonexistent/image:v999
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
